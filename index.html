<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>¡Feliz Cumpleaños Nage! 🎂🌷</title>
<style>
  body {
    margin: 0;
    overflow: hidden;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    /* Fondo degradado suave y festivo */
    background: linear-gradient(135deg, #fdf2f8 0%, #e0f2fe 100%);
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    touch-action: manipulation; /* Optimiza toques en móvil */
  }

  /* PANTALLA DE INICIO (La Carta/Regalo) */
  #overlay {
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    background-color: rgba(255, 255, 255, 0.98);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    z-index: 2000;
    transition: opacity 0.8s ease, transform 0.8s ease;
    cursor: pointer;
  }

  .carta {
    width: 280px;
    height: 180px;
    background-color: #ff99c8; /* Rosa suave */
    position: relative;
    border-radius: 8px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    display: flex;
    justify-content: center;
    align-items: center;
    animation: latido 2.5s infinite;
  }

  /* Solapa de la carta */
  .carta::before {
    content: '';
    position: absolute;
    top: 0; left: 0;
    border-left: 140px solid transparent;
    border-right: 140px solid transparent;
    border-top: 90px solid #ff80b3; /* Rosa más oscuro */
    z-index: 2;
  }

  .sello {
    position: absolute;
    background: #ff0066; /* Rojo fucsia */
    color: white;
    padding: 10px 20px;
    border-radius: 20px;
    font-weight: bold;
    font-size: 18px;
    z-index: 10;
    box-shadow: 0 4px 8px rgba(0,0,0,0.3);
  }

  @keyframes latido {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.04); }
  }

  /* CONTENIDO PRINCIPAL */
  .container {
    width: 100%;
    height: 100vh;
    position: relative;
    text-align: center;
    cursor: pointer; /* Indica que se puede tocar */
  }

  .titulo {
    position: absolute;
    top: 8%;
    width: 100%;
    font-size: 48px;
    color: #ff0066;
    font-weight: bold;
    text-shadow: 2px 2px 0px white, 0 0 10px rgba(255,100,150,0.8);
    z-index: 20;
    pointer-events: none; /* No interfiere con toques */
  }

  /* DISPOSICIÓN: PASTEL CENTRAL Y TULIPANES LATERALES */
  .centro-escena {
    position: absolute;
    bottom: 5%;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    justify-content: center;
    align-items: flex-end;
    z-index: 10;
    pointer-events: none;
  }

  .pastel {
    font-size: 180px;
    margin: 0 40px; /* Espacio para los tulipanes */
    filter: drop-shadow(0 15px 15px rgba(0,0,0,0.2));
    animation: flotar-pastel 3s ease-in-out infinite;
  }

  .tulipan {
    font-size: 90px;
    padding-bottom: 20px;
    animation: balanceo-tulipan 4s ease-in-out infinite;
  }

  /* Animaciones para la escena central */
  @keyframes flotar-pastel {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-15px); }
  }

  @keyframes balanceo-tulipan {
    0%, 100% { transform: rotate(-3deg); }
    50% { transform: rotate(3deg); }
  }

  /* EFECTOS AL TOCAR (Mensajes, Billetes) */
  .mensaje-popup {
    position: absolute;
    font-size: 32px;
    font-weight: bold;
    text-align: center;
    pointer-events: none;
    text-shadow: 2px 2px 0px white;
    z-index: 100;
    animation: flotar-arriba 1.8s ease forwards;
  }

  @keyframes flotar-arriba {
    0% { opacity: 0; transform: scale(0.5) translateY(0); }
    15% { opacity: 1; transform: scale(1.1) translateY(-15px); }
    100% { opacity: 0; transform: scale(1) translateY(-120px); }
  }

  .billete {
    position: absolute;
    font-size: 30px;
    pointer-events: none;
    z-index: 95;
    animation: lluvia-billetes 1.2s cubic-bezier(0.22, 1, 0.36, 1) forwards;
  }

  @keyframes lluvia-billetes {
    0% { transform: translate(0, 0) rotate(0deg) scale(1.2); opacity: 1; }
    /* Se mueven radialmente desde el toque y giran mientras caen */
    100% { transform: translate(var(--dx), var(--dy)) rotate(var(--rot)) scale(0.8); opacity: 0; }
  }

  /* MARIPOSAS CONSTANTES */
  .mariposa {
    position: absolute;
    font-size: 32px;
    animation: volar 10s linear infinite;
    pointer-events: none;
    z-index: 5;
    opacity: 0.9;
  }

  @keyframes volar {
    0% { transform: translate(-10vw, 90vh) rotate(0deg); opacity: 0; }
    10% { opacity: 1; }
    100% { transform: translate(110vw, -10vh) rotate(360deg); opacity: 0; }
  }
</style>
</head>
<body>

<div id="overlay">
  <div class="carta" id="btn-abrir">
    <div class="sello">Tienes un regalo 🎁</div>
  </div>
  <h2 style="color: #ff0066; margin-top: 30px; text-shadow: 1px 1px white;">¡Ábrelo, Nage!</h2>
</div>

<div class="container" id="area-toque">
  <div class="titulo">¡Feliz Cumpleaños Nage!</div>
  
  <div class="centro-escena">
    <div class="tulipan">🌷</div>
    <div class="pastel">🎂</div>
    <div class="tulipan">🌷</div>
  </div>
</div>

<audio id="musica" loop preload="auto">
  <source src="rizos.mp3" type="audio/mpeg">
  Tu navegador no soporta audio.
</audio>

<script>
const audio = document.getElementById('musica');
const btnAbrir = document.getElementById('btn-abrir');
const overlay = document.getElementById('overlay');
const areaToque = document.getElementById('area-toque');

// Función para asegurar la reproducción de audio en móviles tras la interacción
function activarMusica() {
    audio.play().then(() => {
        console.log("Música 'rizos' iniciada con éxito.");
    }).catch(error => {
        console.log("El navegador bloqueó el inicio automático. Reintentando...", error);
        // Pequeño retardo y reintento, a veces necesario en iOS
        setTimeout(() => { audio.play(); }, 150);
    });
}

btnAbrir.addEventListener('click', () => {
  // Aseguramos que el audio tenga permiso de reproducción
  audio.volume = 1.0; 
  activarMusica();
  
  // Animación de salida de la carta
  overlay.style.transform = 'translateY(-100vh)'; 
  overlay.style.opacity = '0';
  // Eliminamos el overlay del flujo tras la animación
  setTimeout(() => {
      overlay.style.display = 'none';
      // Iniciamos las mariposas continuas
      iniciarLluviaMariposas();
  }, 800);
});

// Mensajes y colores para los popups
const mensajes = ["¡Felicidades!", "¡Un abrazo!", "¡Pásalo genial!", "🎂✨", "¡Te queremos! 💖"];
const coloresTexto = ["#ff0066", "#ff66b3", "#cc0099", "#9900cc", "#0099cc"];

areaToque.addEventListener('click', (e) => {
  // 1. Crear Mensaje Popup
  let msg = document.createElement("div");
  msg.className = "mensaje-popup";
  msg.innerText = mensajes[Math.floor(Math.random() * mensajes.length)];
  msg.style.color = coloresTexto[Math.floor(Math.random() * coloresTexto.length)];
  
  // Posicionar el mensaje cerca del toque, ajustando el centro
  msg.style.left = (e.clientX - 100) + "px"; 
  msg.style.top = (e.clientY - 40) + "px";
  document.body.appendChild(msg);
  // Eliminar tras la animación
  setTimeout(() => msg.remove(), 1800);

  // 2. Crear Explosión de Billetes
  crearLluviaBilletes(e.clientX, e.clientY);
});

function crearLluviaBilletes(x, y) {
  // Usamos el emoji de billete para simplicidad y rendimiento
  
  for(let i = 0; i < 30; i++) {
    let billete = document.createElement("div");
    billete.className = "billete";
    billete.innerText = "💵"; // Puedes cambiar por 💸 si prefieres con alas
    billete.style.left = x + "px";
    billete.style.top = y + "px";
    
    // Calcular trayectoria radial aleatoria
    let angulo = Math.random() * Math.PI * 2; // Ángulo completo
    let distancia = Math.random() * 280 + 80; // Radio de explosión
    let rotacionFinal = Math.random() * 1080; // Múltiples giros
    
    // Definir variables CSS para la animación
    billete.style.setProperty('--dx', (Math.cos(angulo) * distancia) + 'px');
    billete.style.setProperty('--dy', (Math.sin(angulo) * distancia) + 'px');
    billete.style.setProperty('--rot', rotacionFinal + 'deg');
    
    document.body.appendChild(billete);
    // Eliminar tras la animación
    setTimeout(() => billete.remove(), 1200);
  }
}

function iniciarLluviaMariposas() {
  setInterval(() => {
    let m = document.createElement("div");
    m.className = "mariposa";
    m.innerHTML = "🦋";
    // Posición vertical aleatoria
    m.style.top = (Math.random() * 60 + 15) + "vh";
    // Velocidad de vuelo aleatoria
    m.style.animationDuration = (Math.random() * 4 + 8) + "s";
    document.body.appendChild(m);
    // Eliminar tras completar el vuelo
    setTimeout(() => m.remove(), 12000);
  }, 1500); // Frecuencia de aparición
}
</script>

</body>
</html>
